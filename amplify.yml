version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g corepack
        - corepack enable
        - corepack prepare pnpm@10.12.4 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'